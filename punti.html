<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Punteggi - LARP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card {
            background: linear-gradient(160deg, #2a1c0d 0%, #1e1208 100%);
            border: 1px solid #5a3e1b;
            border-radius: 8px;
            padding: 1.25rem 1.25rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
        }

        .admin-card.Targaryen { border-color: #6b1a1a; }
        .admin-card.Targaryen::before {
            background: linear-gradient(90deg, transparent, #c0392b, transparent);
        }

        .admin-nome {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: #e8d5a3;
            min-width: 120px;
        }

        .admin-card.Targaryen .admin-nome { color: #e8b4a0; }

        .admin-punteggio {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #c9a84c;
            min-width: 64px;
            text-align: right;
            transition: transform 0.15s ease, color 0.15s ease;
        }

        .admin-card.Targaryen .admin-punteggio { color: #c0392b; }

        .admin-punteggio.flash-su {
            transform: scale(1.3);
            color: #f0d070;
        }
        .admin-punteggio.flash-giu {
            transform: scale(1.3);
            color: #e07070;
        }

        .controlli {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            justify-content: flex-end;
        }

        .controlli input[type="number"] {
            width: 80px;
            background: #120d06;
            border: 1px solid #5a3e1b;
            border-radius: 4px;
            color: #e8d5a3;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            padding: 0.35rem 0.5rem;
            text-align: center;
            outline: none;
        }

        .controlli input[type="number"]:focus { border-color: #c9a84c; }
        .controlli input[type="number"]::-webkit-inner-spin-button,
        .controlli input[type="number"]::-webkit-outer-spin-button { opacity: 1; }

        .btn {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.95); }

        .btn-su {
            background: #1e3a1a;
            border-color: #3a7a30;
            color: #7fcc6a;
        }
        .btn-su:hover { background: #254a20; }

        .btn-giu {
            background: #3a1a1a;
            border-color: #7a3030;
            color: #cc6a6a;
        }
        .btn-giu:hover { background: #4a2020; }

        .btn-reset-tutto {
            display: block;
            margin: 2rem auto 0;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            padding: 0.6rem 1.5rem;
            background: #2a1010;
            border: 1px solid #6b1a1a;
            border-radius: 6px;
            color: #cc6a6a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset-tutto:hover { background: #3a1515; }

        .lista-admin {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 650px;
            margin: 0 auto;
        }

        .link-punteggi {
            display: block;
            text-align: center;
            margin-bottom: 1.5rem;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: #8a7050;
            text-decoration: none;
            transition: color 0.2s;
        }
        .link-punteggi:hover { color: #c9a84c; }
    </style>
</head>
<body>

    <h1 class="titolo-pagina">Gestione Punteggi</h1>
    <a href="view.html" class="link-punteggi">← torna alla classifica</a>

    <div class="lista-admin" id="lista-admin"></div>

    <button class="btn-reset-tutto" onclick="resetTutto()">Azzera tutti i punteggi</button>

    <script>
        const STORAGE_KEY = 'larp_punteggi';

        const casate = [
            { id: 'stark',     nome: 'Stark',     stemma: '⚔',  classe: '',          default: 142 },
            { id: 'lannister', nome: 'Lannister', stemma: '♛',  classe: '',          default: 198 },
            { id: 'targaryen', nome: 'Targaryen', stemma: '🐉', classe: 'Targaryen', default: 231 },
            { id: 'baratheon', nome: 'Baratheon', stemma: '🦌', classe: '',          default: 175 },
            { id: 'greyjoy',   nome: 'Greyjoy',   stemma: '🦑', classe: '',          default: 89  },
        ];

        function caricaPunteggi() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
            catch { return {}; }
        }

        function salvaPunteggi(dati) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dati));
        }

        function getPunteggio(id) {
            const dati = caricaPunteggi();
            return (id in dati) ? dati[id] : casate.find(c => c.id === id).default;
        }

        function modifica(id, segno) {
            const input = document.getElementById('input-' + id);
            const delta = parseInt(input.value);
            if (isNaN(delta) || delta <= 0) { input.focus(); return; }

            const vecchio = getPunteggio(id);
            const nuovo = Math.max(0, vecchio + segno * delta);
            const dati = caricaPunteggi();
            dati[id] = nuovo;
            salvaPunteggi(dati);

            const el = document.getElementById('score-' + id);
            el.textContent = nuovo;
            const dir = nuovo > vecchio ? 'flash-su' : 'flash-giu';
            el.classList.remove('flash-su', 'flash-giu');
            void el.offsetWidth;
            el.classList.add(dir);
            setTimeout(() => el.classList.remove('flash-su', 'flash-giu'), 300);

            input.value = '';
            input.focus();
        }

        function resetTutto() {
            if (!confirm('Azzerare davvero tutti i punteggi?')) return;
            const dati = {};
            casate.forEach(c => { dati[c.id] = 0; });
            salvaPunteggi(dati);
            casate.forEach(c => {
                const el = document.getElementById('score-' + c.id);
                if (el) el.textContent = 0;
            });
        }

        function render() {
            const lista = document.getElementById('lista-admin');
            lista.innerHTML = '';

            casate.forEach(c => {
                const punteggio = getPunteggio(c.id);
                const card = document.createElement('div');
                card.className = 'admin-card' + (c.classe ? ' ' + c.classe : '');

                card.innerHTML = `
                    <span class="admin-nome">${c.stemma} ${c.nome}</span>
                    <span class="admin-punteggio" id="score-${c.id}">${punteggio}</span>
                    <div class="controlli">
                        <input type="number" id="input-${c.id}" placeholder="punti" min="1"
                            onkeydown="if(event.key==='Enter') modifica('${c.id}', +1)">
                        <button class="btn btn-su" onclick="modifica('${c.id}', +1)">+ aggiungi</button>
                        <button class="btn btn-giu" onclick="modifica('${c.id}', -1)">− togli</button>
                    </div>
                `;

                lista.appendChild(card);
            });
        }

        render();
    </script>

</body>
</html>
